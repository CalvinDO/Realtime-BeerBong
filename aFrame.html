<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Document</title>

    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <!--script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script-->
    <!-- we import arjs version without NFT but with marker + location based support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- script src="./src_aFrame/test.js" defer></script -->
    <script src="./src_aFrame/main.js" type="module"></script>

    <style>
        body {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <p id="display" style="position: fixed; top: 10px; left: 10px; font-size: 40px; color: white;">
    </p>
    <script id="console">
        function x() {
            var script = document.createElement('script'); script.src = "//cdn.jsdelivr.net/npm/eruda";
            document.body.appendChild(script);
            script.onload = function () { eruda.init() }
        }
        x();
    </script>
    <a-scene embedded arjs id="a_Scene" antialias="true">
        <a-marker position rotation preset='custom' type='pattern' url='Assets/beerpong.patt' id="a_Marker">
            <!-- we use cors proxy to avoid cross-origin problems ATTENTION! you need to set up your server -->
            <a-entity position="0 0 0" scale="5.88 5.88 5.88">

                <a-entity position="0 -3,43 0" scale='1 1 1' gltf-model="./Assets/Table.glb"></a-entity>

                <a-sphere id="ball" scale='0.02 0.02 0.02' position="0 1.5 0"></a-sphere>
            </a-entity>

        </a-marker>
        <a-entity position rotation camera id="camera"></a-entity>
    </a-scene>

</body>

</html>
