<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Beerphong</title>

    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="./src_aFrame/main.js" type="module"></script>
    <link rel="stylesheet" href="aFrame.css">

    <style>
        body {
            overflow: hidden;
        }
    </style>

</head>

<body>
    <p id="display" style="position: fixed; top: 100px; left: 10px; font-size: 40px; color: white;">
    </p>
    <script id="console">
        function x() {
            var script = document.createElement('script'); script.src = "//cdn.jsdelivr.net/npm/eruda";
            document.body.appendChild(script);
            script.onload = function () { eruda.init() }
        }
        x();
    </script>
    <a-scene embedded arjs id="a_Scene" antialias="true">
        <a-marker position rotation preset='custom' type='pattern' url='Assets/beerpong.patt' id="a_Marker">

            <a-entity id="a_ScaleEntity" position="0 0 0" scale="4.5 4.5 4.5">

                <a-entity position="0 0 0" scale='1 1 1' gltf-model="./Assets/Table.glb"></a-entity>


                <a-sphere id="ball" scale='0.02 0.02 0.02' position="0 1.5 0">
                </a-sphere>
            </a-entity>

        </a-marker>
        <a-entity position rotation camera id="camera"></a-entity>
    </a-scene>
    <div class="cupUI">
        <div class="cups red" rotaion="0">
            <div class="row 1">
                <div class="cup" id="red1"></div>
            </div>
            <div class="row 2">
                <div class="cup" id="red2"></div>
                <div class="cup" id="red3"></div>
            </div>
            <div class="row 3">
                <div class="cup" id="red4"></div>
                <div class="cup" id="red5"></div>
                <div class="cup" id="red6"></div>
            </div>
            <div class="row 4">
                <div class="cup" id="red7"></div>
                <div class="cup" id="red8"></div>
                <div class="cup" id="red9"></div>
                <div class="cup" id="red10"></div>
            </div>
        </div>
        <div class="settings">
            <div class="openClose">
                <p>Scale:</p>
                <p class="close">+</p>
            </div>
            <div class="mode">
                <label class="switch">
                    <input id="sizeToggle" type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
                <div class="label">
                    <p>Table</p>
                    <p>Real Life</p>
                </div>
            </div>
        </div>
        <div class="cups blue" rotation="0">
            <div class="row 1">
                <div class="cup" id="blue1"></div>
            </div>
            <div class="row 2">
                <div class="cup" id="blue2"></div>
                <div class="cup" id="blue3"></div>
            </div>
            <div class="row 3">
                <div class="cup" id="blue4"></div>
                <div class="cup" id="blue5"></div>
                <div class="cup" id="blue6"></div>
            </div>
            <div class="row 4">
                <div class="cup" id="blue7"></div>
                <div class="cup" id="blue8"></div>
                <div class="cup" id="blue9"></div>
                <div class="cup" id="blue10"></div>
            </div>
        </div>
    </div>
</body>

</html>
